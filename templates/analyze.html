<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频分析 - 多源视频热度分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #0a192f; color: #fff; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a3a5c 0%, #0d4a7c 100%); padding: 20px 40px; display: flex; align-items: center; gap: 30px; border-bottom: 2px solid #3498db; }
        .header h1 { font-size: 24px; color: #4fc3f7; }
        .header a { color: #fff; text-decoration: none; font-size: 14px; }
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 50px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: #4fc3f7; margin-bottom: 30px; font-size: 24px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 15px 20px; border-radius: 8px; border: 1px solid #3498db; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #4fc3f7; background: rgba(255,255,255,0.15); }
        button { padding: 15px 40px; border-radius: 8px; border: none; background: linear-gradient(135deg, #3498db, #2980b9); color: #fff; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        button:hover { background: linear-gradient(135deg, #2980b9, #2471a3); transform: translateY(-2px); }
        .tips { color: #888; font-size: 13px; margin-top: 20px; }
        .tips span { display: block; margin: 5px 0; }
        #result { margin-top: 30px; display: none; }
        .success { padding: 20px; background: rgba(46, 204, 113, 0.2); border-radius: 8px; border: 1px solid #2ecc71; }
        .error { padding: 20px; background: rgba(231, 76, 60, 0.2); border-radius: 8px; border: 1px solid #e74c3c; color: #e74c3c; }
        .loading { color: #4fc3f7; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← 返回列表</a>
        <h1>视频热度分析</h1>
    </div>
    <div class="container">
        <div class="card">
            <h2>🔍 输入视频链接分析</h2>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="请输入B站或抖音视频链接..." value="https://www.bilibili.com/video/BV1X1wLz9EWZ/">
                <button onclick="analyze()">分析</button>
            </div>
            <div class="tips">
                <span>支持 B站 视频链接，如: https://www.bilibili.com/video/BV1xx411c7XZ</span>
                <span>支持 抖音 视频链接（预留）</span>
            </div>
            <div id="result"></div>
        </div>
    </div>
    <script>
        async function analyze() {
            const url = document.getElementById('urlInput').value.trim();
            const result = document.getElementById('result');
            if (!url) { alert('请输入链接'); return; }

            result.style.display = 'block';
            result.innerHTML = '<div class="loading">⏳ 分析中，请稍候...</div>';

            try {
                const resp = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await resp.json();

                if (resp.ok) {
                    result.innerHTML = `<div class="success">
                        <p>✅ 分析成功！</p>
                        <p style="margin-top:10px;">📺 ${data.title}</p>
                        <p style="margin-top:5px;">👤 ${data.author}</p>
                        <p style="margin-top:10px;"><a href="/video/${data.id}" style="color:#4fc3f7;">点击查看详情 →</a></p>
                    </div>`;
                } else {
                    result.innerHTML = `<div class="error">❌ ${data.error || '分析失败'}</div>`;
                }
            } catch(e) {
                result.innerHTML = `<div class="error">❌ 网络错误: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
